<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mental Math</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f0f1a;color:#e0e0f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:2.4rem;font-weight:700;background:linear-gradient(90deg,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.25rem;text-align:center}
.subtitle{font-size:.95rem;color:#888;margin-bottom:2rem;text-align:center}
.app{width:100%;max-width:580px}
.section-label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#666;margin-bottom:.6rem}
.op-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.diff-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.op-btn,.diff-btn{padding:12px 8px;border:1.5px solid #2a2a40;border-radius:12px;background:#1a1a2e;color:#ccc;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .15s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:5px}
.op-btn i{font-size:1.3rem;color:#888}
.op-btn:hover,.diff-btn:hover{border-color:#4f46e5;background:#1e1e35;color:#fff}
.op-btn.selected{border-color:#7c3aed;background:linear-gradient(135deg,#1e1040,#1a1a30);color:#a78bfa}
.op-btn.selected i{color:#a78bfa}
.diff-btn.selected{border-color:#2563eb;background:linear-gradient(135deg,#0f1f40,#0f1a30);color:#60a5fa}
.diff-label{font-size:.7rem;color:#555;margin-top:2px}
.diff-btn.selected .diff-label{color:#4a90d9}
.btn-start{display:block;width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;font-size:1.1rem;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.02em}
.btn-start:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 20px rgba(124,58,237,.4)}
.btn-start:disabled{opacity:.35;cursor:not-allowed}
.game-area{display:none;text-align:center}
.question-box{background:#1a1a2e;border:1.5px solid #2a2a40;border-radius:16px;padding:2rem 1.5rem;margin-bottom:1.5rem}
.question-text{font-size:3.5rem;font-weight:700;font-family:'Courier New',monospace;color:#e0e0f0;letter-spacing:.05em;min-height:72px;display:flex;align-items:center;justify-content:center}
.answer-wrap{margin-bottom:.75rem}
.answer-input{width:240px;font-size:2.2rem;font-family:'Courier New',monospace;text-align:center;border:2px solid #2a2a40;border-radius:12px;background:#12121f;color:#e0e0f0;padding:10px 16px;outline:none;transition:border-color .15s}
.answer-input:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.2)}
.answer-input.shake{animation:shake .35s}
.feedback{font-size:.95rem;font-weight:600;height:22px;margin-bottom:1rem}
.feedback.right{color:#34d399}
.feedback.wrong{color:#f87171}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.stat-card{background:#1a1a2e;border:1.5px solid #2a2a40;border-radius:12px;padding:.85rem;text-align:center}
.stat-val{font-size:1.6rem;font-weight:700;font-family:'Courier New',monospace;color:#e0e0f0}
.stat-lbl{font-size:.65rem;color:#666;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.streak-fire{color:#fb923c}
.progress-wrap{background:#1a1a2e;border-radius:20px;height:8px;overflow:hidden;margin-bottom:1rem}
.progress-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#34d399);border-radius:20px;transition:width .4s}
.btn-stop{width:100%;padding:11px;border:1.5px solid #4a1a1a;border-radius:12px;background:transparent;color:#f87171;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-stop:hover{background:#1f0f0f;border-color:#f87171}
.results-card{display:none;background:#1a1a2e;border:1.5px solid #2a2a40;border-radius:16px;padding:2rem;text-align:center}
.result-score{font-size:4rem;font-weight:700;font-family:'Courier New',monospace;background:linear-gradient(90deg,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result-label{font-size:.95rem;color:#888;margin-bottom:1rem}
.result-badge{display:inline-block;padding:6px 18px;border-radius:20px;font-size:.85rem;font-weight:600;background:#1e1040;color:#a78bfa;border:1.5px solid #4c1d95;margin-bottom:1rem}
.result-detail{font-size:.85rem;color:#666;margin-bottom:1.25rem}
.history-row{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:1.5rem}
.hist-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700}
.hist-dot.c{background:#064e3b;color:#34d399}
.hist-dot.w{background:#450a0a;color:#f87171}
.play-again-btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s}
.play-again-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(124,58,237,.4)}
.config-panel{margin-bottom:1.5rem}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.pop{animation:pop .2s}
</style>
</head>
<body>

<div class="app">
  <h1>Mental Math</h1>
  <p class="subtitle">Pick an operation &amp; difficulty — race the clock.</p>

  <!-- CONFIG -->
  <div class="config-panel" id="config">
    <p class="section-label">Operation</p>
    <div class="op-grid">
      <button class="op-btn" data-op="add"><i class="fa-solid fa-plus"></i>Addition</button>
      <button class="op-btn" data-op="sub"><i class="fa-solid fa-minus"></i>Subtraction</button>
      <button class="op-btn" data-op="mul"><i class="fa-solid fa-xmark"></i>Multiply</button>
      <button class="op-btn" data-op="div"><i class="fa-solid fa-divide"></i>Division</button>
      <button class="op-btn" data-op="sqrt"><i class="fa-solid fa-square-root-variable"></i>Square root</button>
      <button class="op-btn" data-op="all"><i class="fa-solid fa-shuffle"></i>Mixed</button>
    </div>
    <p class="section-label">Difficulty</p>
    <div class="diff-grid">
      <button class="diff-btn" data-diff="easy">Easy<span class="diff-label">1 – 20</span></button>
      <button class="diff-btn" data-diff="normal">Normal<span class="diff-label">1 – 100</span></button>
      <button class="diff-btn" data-diff="hard">Hard<span class="diff-label">1 – 1 000</span></button>
      <button class="diff-btn" data-diff="legendary">Legend<span class="diff-label">1 – 1 M</span></button>
    </div>
    <button class="btn-start" id="start-btn" disabled>
      <i class="fa-solid fa-play"></i> Start
    </button>
  </div>

  <!-- GAME -->
  <div class="game-area" id="game-area">
    <div class="question-box">
      <div class="question-text" id="question">?</div>
    </div>
    <div class="answer-wrap">
      <input class="answer-input" type="number" id="answer-in" autocomplete="off" placeholder="?" aria-label="Your answer">
    </div>
    <p class="feedback" id="feedback"></p>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val" id="s-correct">0</div>
        <div class="stat-lbl">Correct</div>
      </div>
      <div class="stat-card">
        <div class="stat-val streak-fire" id="s-streak">0 🔥</div>
        <div class="stat-lbl">Streak</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="s-avg">—</div>
        <div class="stat-lbl">Avg sec</div>
      </div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <button class="btn-stop" id="stop-btn"><i class="fa-solid fa-stop"></i> Stop &amp; see results</button>
  </div>

  <!-- RESULTS -->
  <div class="results-card" id="results-card">
    <div class="result-score" id="r-score">0</div>
    <div class="result-label">questions answered correctly</div>
    <div class="result-badge" id="r-badge">—</div>
    <div class="result-detail" id="r-detail"></div>
    <div class="history-row" id="r-history"></div>
    <button class="play-again-btn" id="play-again-btn"><i class="fa-solid fa-rotate-left"></i> Play again</button>
  </div>
</div>

<script>
const RANGES = { easy: 20, normal: 100, hard: 1000, legendary: 1000000 };
const PERFECT_SQUARES = [1,4,9,16,25,36,49,64,81,100,121,144,169,196,225,256,289,324,361,400];

let op = null, diff = null;
let num1 = 0, num2 = 0, correct = 0, activeOp = null;
let count = 0, streak = 0, maxStreak = 0;
let times = [], history = [];
let startTime = null;

const $ = id => document.getElementById(id);

function rand(max) { return Math.floor(Math.random() * max) + 1; }

function genQuestion() {
  const max = RANGES[diff];
  activeOp = op === 'all'
    ? ['add','sub','mul','div','sqrt'][Math.floor(Math.random() * 5)]
    : op;

  if (activeOp === 'sqrt') {
    num1 = PERFECT_SQUARES[Math.floor(Math.random() * PERFECT_SQUARES.length)];
    num2 = 0;
    correct = Math.sqrt(num1);
    $('question').textContent = '√ ' + num1;
  } else if (activeOp === 'div') {
    const divMax = Math.min(max, 20);
    num2 = rand(divMax);
    correct = rand(Math.min(max, 50));
    num1 = num2 * correct;
    $('question').textContent = num1 + ' ÷ ' + num2;
  } else {
    num1 = rand(max);
    num2 = rand(max);
    const sym = { add: '+', sub: '−', mul: '×' }[activeOp];
    if (activeOp === 'add') correct = num1 + num2;
    else if (activeOp === 'sub') correct = num1 - num2;
    else correct = num1 * num2;
    $('question').textContent = num1 + ' ' + sym + ' ' + num2;
  }
  startTime = Date.now();
}

function updateStats() {
  $('s-correct').textContent = count;
  $('s-streak').textContent = streak + (streak >= 3 ? ' 🔥' : '');
  if (times.length > 0) {
    const avg = times.reduce((a, b) => a + b, 0) / times.length / 1000;
    $('s-avg').textContent = avg.toFixed(1);
  }
  $('progress').style.width = Math.min(100, count * 5) + '%';
}

function getCategory(mean) {
  if (mean < 2) return 'Human calculator 🤖';
  if (mean < 4) return 'Math wizard 🧙';
  if (mean < 7) return 'Solid student 📚';
  if (mean < 10) return 'Taking it slow 🐢';
  return 'Just warming up 😅';
}

function startGame() {
  count = 0; streak = 0; maxStreak = 0; times = []; history = [];
  $('config').style.display = 'none';
  $('results-card').style.display = 'none';
  $('game-area').style.display = 'block';
  $('feedback').textContent = '';
  $('feedback').className = 'feedback';
  $('answer-in').value = '';
  updateStats();
  genQuestion();
  setTimeout(() => $('answer-in').focus(), 60);
}

function stopGame() {
  $('game-area').style.display = 'none';
  $('results-card').style.display = 'block';
  $('r-score').textContent = count;

  const hist = $('r-history');
  hist.innerHTML = '';
  history.forEach((h, i) => {
    const d = document.createElement('div');
    d.className = 'hist-dot ' + (h ? 'c' : 'w');
    d.title = h ? 'Correct' : 'Wrong';
    d.textContent = i + 1;
    hist.appendChild(d);
  });

  if (times.length > 0) {
    const avg = times.reduce((a, b) => a + b, 0) / times.length / 1000;
    $('r-badge').textContent = getCategory(avg);
    $('r-detail').textContent =
      'Avg response: ' + avg.toFixed(2) + 's · Best streak: ' + maxStreak;
  } else {
    $('r-badge').textContent = 'No data';
    $('r-detail').textContent = 'No answers submitted.';
  }
}

// Op & diff selection
document.querySelectorAll('.op-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    op = btn.dataset.op;
    checkReady();
  };
});
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    diff = btn.dataset.diff;
    checkReady();
  };
});

function checkReady() {
  $('start-btn').disabled = !(op && diff);
}

$('start-btn').onclick = startGame;
$('stop-btn').onclick = stopGame;
$('play-again-btn').onclick = () => {
  $('results-card').style.display = 'none';
  $('config').style.display = 'block';
};

$('answer-in').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const val = parseFloat($('answer-in').value);
  if (isNaN(val)) return;

  const elapsed = Date.now() - startTime;

  if (val === correct) {
    times.push(elapsed);
    count++; streak++;
    if (streak > maxStreak) maxStreak = streak;
    history.push(true);

    const fb = $('feedback');
    fb.textContent = '✓ Correct!';
    fb.className = 'feedback right';
    $('answer-in').value = '';
    updateStats();

    // pop animation on question
    const q = $('question');
    q.classList.remove('pop');
    void q.offsetWidth;
    q.classList.add('pop');

    setTimeout(() => { fb.textContent = ''; genQuestion(); }, 350);
  } else {
    streak = 0;
    history.push(false);

    const inp = $('answer-in');
    inp.classList.remove('shake');
    void inp.offsetWidth;
    inp.classList.add('shake');
    inp.addEventListener('animationend', () => inp.classList.remove('shake'), { once: true });

    const fb = $('feedback');
    fb.textContent = '✗ Answer was ' + correct;
    fb.className = 'feedback wrong';
    $('answer-in').value = '';
    updateStats();

    setTimeout(() => { fb.textContent = ''; genQuestion(); }, 1400);
  }
});
</script>
</body>
</html>
